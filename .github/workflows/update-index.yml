name: Aggiorna indice articoli

on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Genera indice
        run: |
          cat > README.md << 'ENDOFREADME'
          # Articoli
          
          Raccolta degli articoli di [Calogero Bonasia](https://github.com/kalosbonasia), ordinati per testata.
          
          Licenza: [CC BY-ND 4.0](https://creativecommons.org/licenses/by-nd/4.0/) — libera condivisione con obbligo di attribuzione e divieto di modifiche.
          
          ---
          ENDOFREADME
          
          for dir in CQElettronica ElettronicaFlash LinuxDay LinuxMagazine medium RadioKit RadioRivista RedHatMagazine StultiferaNavis UbuntuMagazine WindowsNetMagazine hakin9; do
            if [ -d "$dir" ]; then
              echo "" >> README.md
              echo "## $dir" >> README.md
              echo "" >> README.md
              files=$(find "$dir" -maxdepth 1 -name "*.md" ! -name "README.md" | sort)
              if [ -z "$files" ]; then
                echo "_Nessun articolo ancora pubblicato._" >> README.md
              else
                for f in $files; do
                  title=$(grep -m 1 "^# " "$f" | sed 's/^# //')
                  if [ -z "$title" ]; then
                    title=$(basename "$f" .md)
                  fi
                  echo "- [$title]($f)" >> README.md
                done
              fi
            fi
          done

      - name: Commit README aggiornato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Aggiorna indice automaticamente"
          git push
